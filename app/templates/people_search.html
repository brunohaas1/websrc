<!-- Nova aba: Busca de Pessoas -->
<div id="people-search-tab" style="display:none">
  <h2>Busca de Pessoas</h2>
  <form id="people-search-form">
    <input type="text" id="person-name" placeholder="Digite o nome da pessoa" required>
    <label style="margin-left:8px"><input type="checkbox" id="people-consent"> Concordo que esta busca pode coletar informações públicas</label>
    <button type="submit" id="people-search-btn" disabled>Buscar</button>
    <span id="people-search-loading" style="display:none">Buscando...</span>
  </form>
  <div id="people-search-results">
    <h3>Informações Gerais</h3>
    <div id="people-general"></div>
    <h3>Profissional</h3>
    <div id="people-professional"></div>
    <h3>Redes Sociais</h3>
    <div id="people-social"></div>
    <h3>Notícias</h3>
    <div id="people-news"></div>
    <h3>Links Relevantes</h3>
    <div id="people-links"></div>
  </div>
  <button id="people-export-json" style="display:none">Exportar JSON</button>
</div>

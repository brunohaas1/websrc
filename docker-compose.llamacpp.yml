services:
  api:
    depends_on:
      - postgres
      - redis
      - llamacpp

  worker:
    depends_on:
      - postgres
      - redis
      - llamacpp

  scheduler:
    depends_on:
      - redis
      - llamacpp

  llamacpp:
    image: ${LLAMACPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:full}
    container_name: ws-llamacpp
    restart: unless-stopped
    entrypoint:
      - /app/llama-server
    command:
      - -m
      - /models/llama-3.2-3b-instruct-q4_k_m.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "4096"
      - --n-predict
      - "256"
      - --n-gpu-layers
      - "${LLAMACPP_GPU_LAYERS:-35}"
    volumes:
      - ./models:/models
    devices:
      - /dev/dri
    environment:
      - GGML_VK_VISIBLE_DEVICES=0
    ports:
      - "${LLAMACPP_HOST_PORT:-8081}:8080"
    expose:
      - "8080"
